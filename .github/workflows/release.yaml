name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1)

          # If no previous tag, use first commit
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          # Generate release notes
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          # Get commits between previous tag and current tag
          git log ${PREVIOUS_TAG}..${GITHUB_REF_NAME} --pretty=format:"- %s (%h)" --reverse >> release_notes.md

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Container Image" >> release_notes.md
          echo "" >> release_notes.md
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo '```bash' >> release_notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}-${SHORT_SHA}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Using Helm" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "helm install np4ns oci://ghcr.io/${{ github.repository }}/charts/np4ns --version ${GITHUB_REF_NAME#v}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Using kubectl" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "make deploy IMG=ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}-${SHORT_SHA}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${GITHUB_REF_NAME}" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-helm-chart:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Update chart version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: ${VERSION}/" charts/np4ns/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/np4ns/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package charts/np4ns -d .helm-packages

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@v1
        with:
          files: .helm-packages/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to OCI registry
        run: |
          for chart in .helm-packages/*.tgz; do
            helm push "$chart" oci://ghcr.io/${{ github.repository }}/charts
          done
