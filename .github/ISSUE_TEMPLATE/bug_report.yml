name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us debug the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Deploy operator with '...'
        2. Create namespace '...'
        3. Run command '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The network policy should be created...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: No network policy was created...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: np4ns Version
      description: What version of np4ns are you running?
      placeholder: v0.0.5-a1b2c3d or latest-xyz1234
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      description: Output of `kubectl version --short`
      placeholder: "Client: v1.28.0, Server: v1.28.2"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Kubernetes Environment
      description: What type of Kubernetes cluster are you using?
      options:
        - Kind
        - Minikube
        - EKS
        - GKE
        - AKS
        - OpenShift
        - Other (please specify below)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your operator configuration (ConfigMap values)
      placeholder: |
        NS_EXCEPTION_LIST: "kube-system,kube-public"
        NS_TARGET_FOR_NP: ""
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Operator Logs
      description: Relevant logs from the operator (use `kubectl logs -n np4ns-system deployment/np4ns-controller-manager`)
      placeholder: Paste relevant log output here...
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, related issues, etc.)
