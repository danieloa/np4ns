# Example 3: Team-Based Enforcement
# Enforce policies on all team namespaces, exclude monitoring and logging

apiVersion: v1
kind: ConfigMap
metadata:
  name: np4ns-config
  namespace: np4ns-system
data:
  # Exclude system namespaces plus monitoring and logging
  NS_EXCEPTION_LIST: "kube-system,kube-public,kube-node-lease,local-path-storage,monitoring,logging,istio-system"

  # Enforce on all team namespaces (use wildcard by leaving empty, exceptions will still apply)
  NS_TARGET_FOR_NP: ""
